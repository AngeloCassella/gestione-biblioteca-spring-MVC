<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loan Form Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users">Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/books">Books</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/authors">Authors</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/loans">Loans</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h1 class="m-3">Loan Form Page</h1>
    <form th:object="${loan}" th:action="@{/loans/save}" th:method="POST">
        <input type="hidden" th:field="*{id}" required>
        <div class="mb-3">
            <label for="utente" class="form-label">Utente</label>
            <select class="form-select" id="utente" th:field="*{utente}">
                <option th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.nome}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label for="libro" class="form-label">Libro</label>
            <select class="form-select" id="libro" th:field="*{libro}">
                <option th:each="book : ${books}"
                        th:value="${book.id}"
                        th:text="${book.titolo}">
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label for="dataPrestito" class="form-label">Data Prestito</label>
            <input type="date" class="form-control" name="dataPrestito" id="dataPrestito" placeholder="Data Prestito..." th:field="*{dataPrestito}">
        </div>
        <div class="mb-3">
            <label for="dataRestituzione" class="form-label">Data Restituzione</label>
            <input type="date" class="form-control" name="dataRestituzione" id="dataRestituzione" placeholder="Data Restituzione..." th:field="*{dataRestituzione}">
        </div>
        <button type="submit" class="btn btn-primary">Salva</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
